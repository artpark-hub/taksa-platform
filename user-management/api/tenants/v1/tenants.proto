syntax = "proto3";

package api.tenants.v1;

option go_package = "user-management/api/tenants/v1;v1";
option java_multiple_files = true;
option java_package = "api.tenants.v1";

service Tenants {
	rpc CreateTenants (CreateTenantsRequest) returns (CreateTenantsReply);
	rpc UpdateTenants (UpdateTenantsRequest) returns (UpdateTenantsReply);
	rpc DeleteTenants (DeleteTenantsRequest) returns (DeleteTenantsReply);
	rpc GetTenants (GetTenantsRequest) returns (GetTenantsReply);
	rpc ListTenants (ListTenantsRequest) returns (ListTenantsReply);
}

message CreateTenantsRequest {}
message CreateTenantsReply {}

message UpdateTenantsRequest {}
message UpdateTenantsReply {}

message DeleteTenantsRequest {}
message DeleteTenantsReply {}

message GetTenantsRequest {}
message GetTenantsReply {}

message ListTenantsRequest {}
message ListTenantsReply {}