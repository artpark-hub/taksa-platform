syntax = "proto3";
package kratos.api;

option go_package = "telemetry-service/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;
    string source = 2;
  }
  message Nats {
    string url = 1;
    // Subject to subscribe to (supports wildcards, e.g. "umh.>")
    string subject = 2;
    // Queue group name for subscriptions (optional)
    string queue_group = 3;
  }
  Database database = 1;
  Nats nats = 2;
}