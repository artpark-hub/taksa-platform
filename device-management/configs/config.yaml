server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
  jwt_secret: ""   # OPTIONAL: Leave empty to autogenerate. Can override via TAKSA_DM_JWT_SECRET env var
log_level: debug  # Options: debug, info, warn, error, production
log_file: /data/taksa-device-management.log  # Log file path (logs to both console and file)
data:
  database:
    driver: postgres
    source: postgres://user:password@localhost/taksa_platform_dm?sslmode=disable
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: 300
    conn_max_idle_time: 10
deployment:
  base_url: http://localhost:8000
  umh_core_docker_image: management.umh.app/oci/united-manufacturing-hub/umh-core:v0.43.17
