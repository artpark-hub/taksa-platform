server:
  http:
    addr: 0.0.0.0:8000
    timeout: 1s
  grpc:
    addr: 0.0.0.0:9000
    timeout: 1s
log_level: debug  # Options: debug, info, warn, error, production
log_file: /data/taksa-platform-dm.log  # Log file path (logs to both console and file)
data:
  database:
    driver: sqlite3
    source: /data/taksa_platform_dm.db
    max_open_conns: 25
    max_idle_conns: 5
    conn_max_lifetime: 300
    conn_max_idle_time: 10
