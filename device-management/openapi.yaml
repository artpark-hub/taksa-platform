                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.devicemgmt.v1.HealthResponse'
components:
    schemas:
        api.common.CompanyDetails:
            type: object
            properties:
                owner:
                    type: string
                certificate:
                    type: string
                encryptedPrivateKey:
                    type: string
                name:
                    type: string
                licenseStatus:
                    $ref: '#/components/schemas/api.common.LicenseStatus'
                userCount:
                    type: string
            description: |-
                CompanyDetails contains company/organization information
                 Wire protocol version - matches umh-core exactly
                 This is what umh-core sends in LoginResponse
                 CRITICAL: Must use these field names and types for wire protocol compatibility
        api.common.LicenseStatus:
            type: object
            properties:
                validTo:
                    type: string
                description:
                    type: string
                isActive:
                    type: boolean
            description: |-
                LicenseStatus tracks device licensing information
                 Wire protocol version - matches umh-core exactly
                 CRITICAL: validTo is a STRING in wire format (date format: "2006-01-02")
        api.common.MessageMetadata:
            type: object
            properties:
                traceId:
                    type: string
            description: |-
                MessageMetadata for distributed tracing
                 Shared between instance-facing (umh-core) and management console APIs
                 MUST match umh-core's MessageMetadata exactly (pkg/models/action_models.go:60-62)
        api.devicemgmt.v1.ActionQueuedResponse:
            type: object
            properties:
                actionId:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                expiresAt:
                    type: string
                    format: date-time
            description: ActionQueuedResponse is returned by all action-sending RPCs
        api.devicemgmt.v1.AddDataModelRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                structure:
                    type: object
        api.devicemgmt.v1.CancelActionRequest:
            type: object
            properties:
                deviceId:
                    type: string
                actionId:
                    type: string
            description: CancelActionRequest cancels a QUEUED action before the device pulls it.
        api.devicemgmt.v1.CancelActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
        api.devicemgmt.v1.DataFlowComponentActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                result:
                    $ref: '#/components/schemas/api.umh_core.v2.DataFlowComponent'
        api.devicemgmt.v1.DataFlowComponentSummary:
            type: object
            properties:
                uuid:
                    type: string
                name:
                    type: string
                benthosImageTag:
                    type: string
        api.devicemgmt.v1.DataModelActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                result:
                    $ref: '#/components/schemas/api.umh_core.v2.DataModelOperationResult'
                results:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/api.umh_core.v2.DataModelOperationResult'
        api.devicemgmt.v1.DataModelSummary:
            type: object
            properties:
                name:
                    type: string
                version:
                    type: string
                description:
                    type: string
        api.devicemgmt.v1.DeployDataFlowComponentRequest:
            type: object
            properties:
                deviceId:
                    type: string
                payload:
                    $ref: '#/components/schemas/api.umh_core.v2.DeployDataFlowComponentPayload'
        api.devicemgmt.v1.DeployOpcUaProtocolConverterRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                connection:
                    $ref: '#/components/schemas/api.devicemgmt.v1.ProtocolConverterConnection'
                location:
                    $ref: '#/components/schemas/api.devicemgmt.v1.ProtocolConverterLocation'
                input:
                    $ref: '#/components/schemas/api.devicemgmt.v1.OpcUaInputSection'
                read_flow:
                    $ref: '#/components/schemas/api.devicemgmt.v1.OpcUaReadFlowSection'
                template_variables:
                    type: object
                    additionalProperties:
                        type: string
                apply_read_config:
                    type: boolean
                state:
                    type: string
                    description: 'umh-core desired FSM state: "active" (default) or "stopped".'
        api.devicemgmt.v1.DeployProtocolConverterRequest:
            type: object
            properties:
                deviceId:
                    type: string
                payload:
                    $ref: '#/components/schemas/api.umh_core.v2.ProtocolConverter'
        api.devicemgmt.v1.DeployStreamProcessorRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                uuid:
                    type: string
                config:
                    type: object
                modelName:
                    type: string
                modelVersion:
                    type: string
                location:
                    type: object
                    additionalProperties:
                        type: string
                ignoreHealthCheck:
                    type: boolean
        api.devicemgmt.v1.Device:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                createdBy:
                    type: string
                metadata:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceMetadata'
                location:
                    allOf:
                        - $ref: '#/components/schemas/api.devicemgmt.v1.DeviceLocation'
                    description: |-
                        Location using ISA-95 5-level hierarchy (enterprise, site, area, line, workCell)
                         CRITICAL: Must be compatible with umh-core's Location struct
                         Used for Kafka topic path and location-based filtering
                status:
                    type: integer
                    format: enum
                createdAt:
                    type: string
                    format: date-time
                lastSeen:
                    type: string
                    format: date-time
                lastLogin:
                    type: string
                    format: date-time
                authTokenExpiresAt:
                    type: string
                    format: date-time
                certificate:
                    type: string
                    description: Certificate management
                encryptedPrivateKey:
                    type: string
            description: |-
                Device represents a managed edge device (runs UMH Core instance)
                 Contains full details including certificates. Use DeviceSummary for list/summary responses.
        api.devicemgmt.v1.DeviceAgentLatencySummary:
            type: object
            properties:
                avg_ms:
                    type: number
                    format: double
                max_ms:
                    type: number
                    format: double
                min_ms:
                    type: number
                    format: double
                p95_ms:
                    type: number
                    format: double
                p99_ms:
                    type: number
                    format: double
        api.devicemgmt.v1.DeviceConfigActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                getConfigResponse:
                    $ref: '#/components/schemas/api.umh_core.v2.GetConfigFileResponse'
                setConfigResponse:
                    $ref: '#/components/schemas/api.umh_core.v2.SetConfigFileResponse'
        api.devicemgmt.v1.DeviceCoreHealthSummary:
            type: object
            properties:
                message:
                    type: string
                state:
                    type: string
                desired_state:
                    type: string
                category:
                    type: string
                    description: 'Category: "active" | "degraded" | "neutral"'
        api.devicemgmt.v1.DeviceHealthResponse:
            type: object
            properties:
                deviceId:
                    type: string
                lastSeen:
                    type: string
                    description: |-
                        Last time the device communicated with device-management (Pull heartbeat).
                         Note: this replaces the former last_updated field (same tag = 2).
                    format: date-time
                deviceTimestamp:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                deviceStatus:
                    type: integer
                    description: Effective device status derived from last_seen (ACTIVE/INACTIVE), matching ListDevices.
                    format: enum
                coreHealth:
                    allOf:
                        - $ref: '#/components/schemas/api.devicemgmt.v1.DeviceCoreHealthSummary'
                    description: Latest device-reported health summaries (when the device sends StatusMessage heartbeats)
                agentLatency:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceAgentLatencySummary'
                resources:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceResourcesSummary'
                release:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceReleaseSummary'
            description: |-
                DeviceHealthResponse contains health metrics from latest Push API data.
                 This endpoint is intentionally summary-only: it avoids returning the full device StatusMessage payload
                 (which may include large blobs like UNS bundles, or detailed per-component inventories).
        api.devicemgmt.v1.DeviceLocation:
            type: object
            properties:
                levels:
                    type: object
                    additionalProperties:
                        type: string
                    description: |-
                        Map of location levels: key is level number as string ("0", "1", "2", ..., "6", etc.)
                         Level 0 (company) is required; other levels are optional
            description: |-
                DeviceLocation represents hierarchical location as map of levels
                 CRITICAL: Must match umh-core's location structure: map[string]string with int keys as strings

                 umh-core config.yaml location format (7-level ISA-95 hierarchy):
                   location:
                     "0": company       # Level 0: Enterprise/Company (required)
                     "1": plant         # Level 1: Manufacturing plant or site
                     "2": area          # Level 2: Production area
                     "3": zone          # Level 3: Work zone or line group
                     "4": line          # Level 4: Production line
                     "5": workCell      # Level 5: Work cell
                     "6": workUnit      # Level 6: Work unit or station

                 Note: Levels can be extended beyond 7 if needed; levels are numeric strings as keys
                 Reference: umh-core/pkg/communicator/actions/edit_instance_test.go
        api.devicemgmt.v1.DeviceMetadata:
            type: object
            properties:
                hardwareVersion:
                    type: string
                operatingSystem:
                    type: string
                manufacturer:
                    type: string
                firmwareVersion:
                    type: string
                ipAddress:
                    type: string
                macAddress:
                    type: string
            description: DeviceMetadata contains hardware and software information
        api.devicemgmt.v1.DeviceReleaseSummary:
            type: object
            properties:
                version:
                    type: string
                channel:
                    type: string
        api.devicemgmt.v1.DeviceResourcesSummary:
            type: object
            properties:
                cpu_total_usage_m_cpu:
                    type: number
                    description: CPU
                    format: double
                cpu_core_count:
                    type: integer
                    format: int32
                cpu_cgroup_cores:
                    type: number
                    format: double
                cpu_throttle_ratio:
                    type: number
                    format: double
                cpu_is_throttled:
                    type: boolean
                memory_used_bytes:
                    type: string
                    description: Memory / Disk
                memory_total_bytes:
                    type: string
                disk_used_bytes:
                    type: string
                disk_total_bytes:
                    type: string
                hwid:
                    type: string
                    description: Hardware / runtime info
                architecture:
                    type: string
        api.devicemgmt.v1.DeviceSummary:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                createdBy:
                    type: string
                location:
                    allOf:
                        - $ref: '#/components/schemas/api.devicemgmt.v1.DeviceLocation'
                    description: Location using ISA-95 5-level hierarchy
                status:
                    type: integer
                    format: enum
                createdAt:
                    type: string
                    format: date-time
                lastSeen:
                    type: string
                    format: date-time
            description: |-
                DeviceSummary represents a lightweight device summary for list/overview responses
                 Contains only essential device information without certificate data or extended company details
        api.devicemgmt.v1.DeviceTopic:
            type: object
            properties:
                topic:
                    type: string
                unsTreeId:
                    type: string
                level0:
                    type: string
                locationSublevels:
                    type: array
                    items:
                        type: string
                dataContract:
                    type: string
                virtualPath:
                    type: string
                name:
                    type: string
                metadata:
                    type: array
                    items:
                        $ref: '#/components/schemas/api.devicemgmt.v1.TopicMetadataEntry'
                timeSeries:
                    $ref: '#/components/schemas/api.devicemgmt.v1.TopicTimeSeriesEvent'
                relational:
                    $ref: '#/components/schemas/api.devicemgmt.v1.TopicRelationalEvent'
                updatedAt:
                    type: string
                    format: date-time
            description: One UNS topic row materialized from device status (core.topicBrowser).
        api.devicemgmt.v1.DeviceTopicCatalogStatus:
            type: object
            properties:
                deviceId:
                    type: string
                catalogLastSyncedAt:
                    type: string
                    format: date-time
                reportedTopicCount:
                    type: integer
                    format: int32
                materializedTopicCount:
                    type: integer
                    format: int32
                lastSyncMode:
                    type: integer
                    format: enum
                lastFullReplaceAt:
                    type: string
                    format: date-time
                lastHadBundleZero:
                    type: boolean
                catalogStaleWarning:
                    type: boolean
                    description: True when materialized count exceeds last reported count (incremental-only sync for a while).
            description: Materialized catalog sync state for a device (from status, no edge changes).
        api.devicemgmt.v1.EditDataModelRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
