                Push device status and telemetry to console
                 Compatible with: POST /api/v2/instance/push
            operationId: InstanceService_Push
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/api.umh_core.v2.PushRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content: {}
    /api/v2/instance/user/certificate:
