            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                resultPayload:
                    type: string
                    description: |-
                        Result payload (only populated when status=COMPLETED)
                         Format: JSON string containing array of log lines: ["line 1", "line 2", ...]
                         Server automatically decompresses gzip/zstd payloads before returning
                         Client can directly parse as JSON without decoding base64
        api.devicemgmt.v1.MetricsActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                resultPayload:
                    type: string
                    description: |-
                        Result payload (only populated when status=COMPLETED)
                         Format: JSON string containing array of metric objects
                         Each metric: {"name": "...", "value": "...", "componentType": "...", ...}
                         Server automatically decompresses gzip/zstd payloads before returning
                         Client can directly parse as JSON without decoding base64
        api.devicemgmt.v1.ProtocolConverterActionResponse:
