            description: |-
                UMHMessage is the standard message format for device-console communication
                 MUST match umh-core's models.UMHMessage exactly (pkg/models/action_models.go:79-84)
                 Wire protocol - clean, simple, compatible with umh-core
                 Internal correlation tracking is handled separately in device-management
tags:
    - name: DeviceMgmtService
      description: |-
        DeviceMgmtService handles device management operations
         These are called by the management console and administrative tools

         API Patterns:
         - SYNCHRONOUS (immediate response): Device CRUD, List operations, Health status
         - ASYNCHRONOUS (queue-and-poll): All component actions (Deploy, Edit, Delete, Get)
           Returns action_id immediately, client polls for result via GetXActionResponse

         umh-core Compatibility:
         All component action RPCs correspond directly to umh-core action handlers
         (pkg/communicator/actions/actions.go). List and Health endpoints provide
         database/cache layer above the action queue.
    - name: InstanceService
      description: |-
        InstanceService handles device-facing operations
         These are called by edge devices (umh-core)
         All endpoints are compatible with umh-core expectations
