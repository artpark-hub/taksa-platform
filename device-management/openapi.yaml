                  in: path
                  required: true
                  schema:
                    type: string
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.devicemgmt.v1.ActionQueuedResponse'
        patch:
            tags:
                - DeviceMgmtService
            description: |-
                Queue action to edit an existing stream processor
                 Supported by: umh-core EditStreamProcessor action
            operationId: DeviceMgmtService_EditStreamProcessor
            parameters:
                - name: deviceId
                  in: path
                  required: true
                  schema:
                    type: string
                - name: uuid
                  in: path
                  required: true
                  schema:
                    type: string
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/api.devicemgmt.v1.EditStreamProcessorRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.devicemgmt.v1.ActionQueuedResponse'
    /api/v2/instance/login:
        post:
            tags:
                - InstanceService
            description: |-
                Login/authenticate a device
                 RPC: POST /api/v2/instance/login
                 Compatible with: umh-core v0.43.17+
                 Client sends: POST with Authorization: Bearer <SHA3(SHA3(token))> header, no body
                 Server returns: JWT token in "token" HttpOnly cookie + LoginResponse JSON body
                 Authentication: token hash validated against stored raw auth tokens
            operationId: InstanceService_Login
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.umh_core.v2.LoginResponse'
    /api/v2/instance/pull:
        get:
            tags:
                - InstanceService
            description: |-
                Pull (retrieve) queued actions from console
                 Compatible with: GET /api/v2/instance/pull
            operationId: InstanceService_Pull
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.umh_core.v2.PullResponse'
    /api/v2/instance/push:
        post:
            tags:
                - InstanceService
            description: |-
                Push device status and telemetry to console
                 Compatible with: POST /api/v2/instance/push
            operationId: InstanceService_Push
            requestBody:
                content:
                    application/json:
                        schema:
                            $ref: '#/components/schemas/api.umh_core.v2.PushRequest'
                required: true
            responses:
                "200":
                    description: OK
                    content: {}
    /api/v2/instance/user/certificate:
        get:
            tags:
                - InstanceService
            description: |-
                Get device certificate for TLS communication
                 Compatible with: GET /api/v2/instance/user/certificate
            operationId: InstanceService_GetCertificate
            parameters:
                - name: email
                  in: query
                  schema:
                    type: string
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.umh_core.v2.Certificate'
    /health:
        get:
            tags:
                - DeviceMgmtService
            description: |-
                Health check endpoint - returns service status
                 Used by Docker healthchecks, Kubernetes probes, load balancers
            operationId: DeviceMgmtService_Health
            responses:
                "200":
                    description: OK
                    content:
                        application/json:
                            schema:
                                $ref: '#/components/schemas/api.devicemgmt.v1.HealthResponse'
components:
    schemas:
        api.common.CompanyDetails:
            type: object
            properties:
                owner:
                    type: string
                certificate:
                    type: string
                encryptedPrivateKey:
                    type: string
                name:
                    type: string
                licenseStatus:
                    $ref: '#/components/schemas/api.common.LicenseStatus'
                userCount:
                    type: string
            description: |-
                CompanyDetails contains company/organization information
                 Wire protocol version - matches umh-core exactly
                 This is what umh-core sends in LoginResponse
                 CRITICAL: Must use these field names and types for wire protocol compatibility
        api.common.LicenseStatus:
            type: object
            properties:
                validTo:
                    type: string
                description:
                    type: string
                isActive:
                    type: boolean
            description: |-
                LicenseStatus tracks device licensing information
                 Wire protocol version - matches umh-core exactly
                 CRITICAL: validTo is a STRING in wire format (date format: "2006-01-02")
        api.common.MessageMetadata:
            type: object
            properties:
                traceId:
                    type: string
            description: |-
                MessageMetadata for distributed tracing
                 Shared between instance-facing (umh-core) and management console APIs
                 MUST match umh-core's MessageMetadata exactly (pkg/models/action_models.go:60-62)
        api.devicemgmt.v1.ActionQueuedResponse:
            type: object
            properties:
                actionId:
                    type: string
                createdAt:
                    type: string
                    format: date-time
                expiresAt:
                    type: string
                    format: date-time
            description: ActionQueuedResponse is returned by all action-sending RPCs
        api.devicemgmt.v1.AddDataModelRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                structure:
                    type: object
        api.devicemgmt.v1.CompanyDetailsExtended:
            type: object
            properties:
                base:
                    $ref: '#/components/schemas/api.common.CompanyDetails'
                contactEmail:
                    type: string
                supportContact:
                    type: string
                tags:
                    type: array
                    items:
                        type: string
            description: |-
                ============================================================================
                 Extended Company Details for Management Console
                 ============================================================================
                 CompanyDetailsExtended adds management console-specific fields to the
                 canonical wire protocol CompanyDetails. These fields are NOT sent to umh-core,
                 but are used internally by the management console.
        api.devicemgmt.v1.DataFlowComponentActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                result:
                    $ref: '#/components/schemas/api.umh_core.v2.DataFlowComponent'
        api.devicemgmt.v1.DataFlowComponentSummary:
            type: object
            properties:
                uuid:
                    type: string
                name:
                    type: string
                benthosImageTag:
                    type: string
        api.devicemgmt.v1.DataModelActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                result:
                    $ref: '#/components/schemas/api.umh_core.v2.DataModelOperationResult'
                results:
                    type: object
                    additionalProperties:
                        $ref: '#/components/schemas/api.umh_core.v2.DataModelOperationResult'
        api.devicemgmt.v1.DataModelSummary:
            type: object
            properties:
                name:
                    type: string
                version:
                    type: string
                description:
                    type: string
        api.devicemgmt.v1.DeployDataFlowComponentRequest:
            type: object
            properties:
                deviceId:
                    type: string
                payload:
                    $ref: '#/components/schemas/api.umh_core.v2.DeployDataFlowComponentPayload'
        api.devicemgmt.v1.DeployProtocolConverterRequest:
            type: object
            properties:
                deviceId:
                    type: string
                payload:
                    $ref: '#/components/schemas/api.umh_core.v2.ProtocolConverter'
        api.devicemgmt.v1.DeployStreamProcessorRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                uuid:
                    type: string
                config:
                    type: object
                modelName:
                    type: string
                modelVersion:
                    type: string
                location:
                    type: object
                    additionalProperties:
                        type: string
                ignoreHealthCheck:
                    type: boolean
        api.devicemgmt.v1.Device:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                serialNumber:
                    type: string
                metadata:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceMetadata'
                location:
                    allOf:
                        - $ref: '#/components/schemas/api.devicemgmt.v1.DeviceLocation'
                    description: |-
                        Location using ISA-95 5-level hierarchy (enterprise, site, area, line, workCell)
                         CRITICAL: Must be compatible with umh-core's Location struct
                         Used for Kafka topic path and location-based filtering
                company:
                    $ref: '#/components/schemas/api.devicemgmt.v1.CompanyDetailsExtended'
                status:
                    type: integer
                    format: enum
                createdAt:
                    type: string
                    format: date-time
                lastSeen:
                    type: string
                    format: date-time
                lastLogin:
                    type: string
                    format: date-time
                authTokenExpiresAt:
                    type: string
                    format: date-time
                certificate:
                    type: string
                    description: Certificate management
                encryptedPrivateKey:
                    type: string
                companyCertificate:
                    type: string
            description: |-
                Device represents a managed edge device (runs UMH Core instance)
                 NOTE: Uses CompanyDetailsExtended which wraps the canonical wire protocol version
                 Contains full details including certificates. Use DeviceSummary for list/summary responses.
        api.devicemgmt.v1.DeviceConfigActionResponse:
            type: object
            properties:
                actionId:
                    type: string
                status:
                    type: integer
                    format: enum
                completedAt:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
                getConfigResponse:
                    $ref: '#/components/schemas/api.umh_core.v2.GetConfigFileResponse'
                setConfigResponse:
                    $ref: '#/components/schemas/api.umh_core.v2.SetConfigFileResponse'
        api.devicemgmt.v1.DeviceHealthResponse:
            type: object
            properties:
                deviceId:
                    type: string
                lastUpdated:
                    type: string
                    format: date-time
                status:
                    $ref: '#/components/schemas/api.umh_core.v2.StatusMessage'
                statusB64:
                    type: string
                deviceTimestamp:
                    type: string
                    format: date-time
                errorMessage:
                    type: string
            description: DeviceHealthResponse contains health metrics from latest Push API data
        api.devicemgmt.v1.DeviceLocation:
            type: object
            properties:
                levels:
                    type: object
                    additionalProperties:
                        type: string
                    description: |-
                        Map of location levels: key is level number as string ("0", "1", "2", ..., "6", etc.)
                         Level 0 (company) is required; other levels are optional
            description: |-
                DeviceLocation represents hierarchical location as map of levels
                 CRITICAL: Must match umh-core's location structure: map[string]string with int keys as strings

                 umh-core config.yaml location format (7-level ISA-95 hierarchy):
                   location:
                     "0": company       # Level 0: Enterprise/Company (required)
                     "1": plant         # Level 1: Manufacturing plant or site
                     "2": area          # Level 2: Production area
                     "3": zone          # Level 3: Work zone or line group
                     "4": line          # Level 4: Production line
                     "5": workCell      # Level 5: Work cell
                     "6": workUnit      # Level 6: Work unit or station

                 Note: Levels can be extended beyond 7 if needed; levels are numeric strings as keys
                 Reference: umh-core/pkg/communicator/actions/edit_instance_test.go
        api.devicemgmt.v1.DeviceMetadata:
            type: object
            properties:
                hardwareVersion:
                    type: string
                operatingSystem:
                    type: string
                manufacturer:
                    type: string
                firmwareVersion:
                    type: string
                ipAddress:
                    type: string
                macAddress:
                    type: string
            description: DeviceMetadata contains hardware and software information
        api.devicemgmt.v1.DeviceSummary:
            type: object
            properties:
                id:
                    type: string
                name:
                    type: string
                serialNumber:
                    type: string
                metadata:
                    $ref: '#/components/schemas/api.devicemgmt.v1.DeviceMetadata'
                location:
                    allOf:
                        - $ref: '#/components/schemas/api.devicemgmt.v1.DeviceLocation'
                    description: Location using ISA-95 5-level hierarchy
                company:
                    allOf:
                        - $ref: '#/components/schemas/api.common.CompanyDetails'
                    description: Basic company info (name and license only, no contact/support/tags)
                status:
                    type: integer
                    format: enum
                createdAt:
                    type: string
                    format: date-time
                lastSeen:
                    type: string
                    format: date-time
                authTokenExpiresAt:
                    type: string
                    format: date-time
            description: |-
                DeviceSummary represents a lightweight device summary for list/overview responses
                 Contains only essential device information without certificate data or extended company details
        api.devicemgmt.v1.EditDataModelRequest:
            type: object
            properties:
                deviceId:
                    type: string
                name:
                    type: string
                description:
                    type: string
                structure:
                    type: object
        api.devicemgmt.v1.EditProtocolConverterRequest:
            type: object
            properties:
                deviceId:
                    type: string
                uuid:
                    type: string
                    description: |-
                        Protocol converter UUID (path parameter - authoritative)
                         If payload.uuid is provided, it must match this value (validation at API)
                payload:
                    $ref: '#/components/schemas/api.umh_core.v2.ProtocolConverter'
        api.devicemgmt.v1.EditStreamProcessorRequest:
            type: object
            properties:
                deviceId:
                    type: string
                uuid:
                    type: string
                name:
                    type: string
                config:
