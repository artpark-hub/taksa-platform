syntax = "proto3";
package kratos.api;

option go_package = "taksa-platform-dm/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  string log_level = 3;  // Log level: debug, info, warn, error, production
  string log_file = 4;   // Log file path (optional, e.g., /tmp/taksa-platform-dm.log)
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
}

message Data {
  message Database {
    string driver = 1;        // "sqlite3" or "postgres"
    string source = 2;        // File path for SQLite, DSN for PostgreSQL
    int32 max_open_conns = 3; // Connection pool size (default: 25)
    int32 max_idle_conns = 4; // Max idle connections (default: 5)
    int32 conn_max_lifetime = 5; // Connection lifetime in seconds (default: 300)
    int32 conn_max_idle_time = 6; // Idle timeout in seconds (default: 10)
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
