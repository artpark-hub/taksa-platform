syntax = "proto3";
package kratos.api;

option go_package = "taksa-platform-dm/internal/conf;conf";

import "google/protobuf/duration.proto";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  string log_level = 3;  // Log level: debug, info, warn, error, production
  string log_file = 4;   // Log file path (optional, e.g., /tmp/taksa-platform-dm.log)
  Deployment deployment = 5; // Deployment configuration (docker image, base URLs)
  DeviceStatusSubscription device_status_subscription = 6;
}

// Controls automatic edge status subscribe actions (pull-time catalog/heartbeat staleness).
// When auto resubscribe is off, use EnsureDeviceStatusSubscription RPC per device (or login).
message DeviceStatusSubscription {
  // When true (default in configs), DM re-queues subscribe on pull when catalog/status is stale.
  // Set false for large fleets with heavy status payloads. Omitted => true (see ResolveStatusSubscriptionSettings).
  optional bool auto_resubscribe_status_messages = 1;
  // Re-queue subscribe when catalog last_synced_at is older than this while device last_seen is fresh.
  google.protobuf.Duration catalog_stale_threshold = 2;
  // Also treat persisted status messages older than this as stale (covers push gaps).
  google.protobuf.Duration status_heartbeat_stale_threshold = 3;
}

message Deployment {
  string base_url = 1;              // API base URL (e.g., http://localhost:8000)
  string umh_core_docker_image = 2; // UMH-Core docker image URI
  // Comma-separated NATS broker URLs (e.g. nats://host:4222) for auto-deployed UNS→NATS mirror on device login.
  // Empty disables EnsureUNSToNATSMirror (no deploy-data-flow-component is queued).
  string nats_mirror_urls = 3;
}

message Server {
  message HTTP {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  message GRPC {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration timeout = 3;
  }
  HTTP http = 1;
  GRPC grpc = 2;
  string jwt_secret = 3;  // JWT signing secret for device auth tokens (optional; may be provided via TAKSA_DM_JWT_SECRET, or auto-generated and persisted at startup if empty)
}

message Data {
  message Database {
    string driver = 1;        // "sqlite3" or "postgres"
    string source = 2;        // File path for SQLite, DSN for PostgreSQL
    int32 max_open_conns = 3; // Connection pool size (default: 25)
    int32 max_idle_conns = 4; // Max idle connections (default: 5)
    int32 conn_max_lifetime = 5; // Connection lifetime in seconds (default: 300)
    int32 conn_max_idle_time = 6; // Idle timeout in seconds (default: 10)
  }
  message Redis {
    string network = 1;
    string addr = 2;
    google.protobuf.Duration read_timeout = 3;
    google.protobuf.Duration write_timeout = 4;
  }
  Database database = 1;
  Redis redis = 2;
}
