syntax = "proto3";

package api.devicemgmt.v1;

import "google/api/annotations.proto";
import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";
import "devicemgmt/v1/models.proto";
import "umh-core/v2/models.proto";

option go_package = "github.com/artpark-hub/taksa-platform/device-management/api/devicemgmt/v1;v1";
option java_multiple_files = true;
option java_package = "api.devicemgmt.v1";

// DeviceMgmtService handles device management operations
// These are called by the management console and administrative tools
//
// API Patterns:
// - SYNCHRONOUS (immediate response): Device CRUD, List operations, Health status
// - ASYNCHRONOUS (queue-and-poll): All component actions (Deploy, Edit, Delete, Get)
//   Returns action_id immediately, client polls for result via GetXActionResponse
//
// umh-core Compatibility:
// All component action RPCs correspond directly to umh-core action handlers
// (pkg/communicator/actions/actions.go). List and Health endpoints provide
// database/cache layer above the action queue.
service DeviceMgmtService {

  // ============================================================================
  // Health Check RPC (for orchestration and load balancers)
  // ============================================================================

  // Health check endpoint - returns service status
  // Used by Docker healthchecks, Kubernetes probes, load balancers
  rpc Health(google.protobuf.Empty) returns (HealthResponse) {
    option (google.api.http) = {
      get: "/health"
    };
  }

  // ============================================================================
  // Edge Device Management RPCs (SYNCHRONOUS)
  // ============================================================================

  // Create a new device with the management system
  rpc RegisterDevice(RegisterDeviceRequest) returns (RegisterDeviceResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices"
      body: "*"
    };
  }

  // List all registered devices
  rpc ListDevices(ListDevicesRequest) returns (ListDevicesResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices"
    };
  }

  // Get device information
  rpc GetDevice(GetDeviceRequest) returns (Device) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}"
    };
  }

  // Get device health metrics (stored from Push API)
  rpc GetDeviceHealth(GetDeviceHealthRequest) returns (DeviceHealthResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/health"
    };
  }

  // Update device information
  rpc UpdateDevice(UpdateDeviceRequest) returns (Device) {
    option (google.api.http) = {
      patch: "/api/v1/devicemgmt/devices/{device_id}"
      body : "*"
    };
  }

  // Delete/decommission a device
  rpc DeleteDevice(DeleteDeviceRequest) returns (google.protobuf.Empty) {
    option (google.api.http) = {
      delete: "/api/v1/devicemgmt/devices/{device_id}"
    };
  }

  // ============================================================================
  // Edge Device Config RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // Config operations are asynchronous. Supported by umh-core:
  // - GetConfigFile (action type: get-config-file)
  // - SetConfigFile (action type: set-config-file)

  // Queue action to get device configuration (config.yaml)
  // Supported by: umh-core GetConfigFile action (no payload - umh-core reads default config path)
  rpc GetDeviceConfig(GetDeviceConfigRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/config"
    };
  }

  // Queue action to set device configuration (config.yaml)
  // Supported by: umh-core SetConfigFile action
  // Note: This completely overwrites the configuration file, not a partial update
  rpc SetDeviceConfig(SetDeviceConfigRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      put: "/api/v1/devicemgmt/devices/{device_id}/config"
      body : "*"
    };
  }

  // Get result of DeviceConfig action (handles both GET and SET results)
  rpc GetDeviceConfigActionResponse(ActionResultRequest) returns (DeviceConfigActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/config/{action_id}/result"
    };
  }

  // ============================================================================
  // Logs RPCs
  // ============================================================================

  // ============================================================================
  // Logs & Metrics RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // Diagnostics operations are asynchronous. Supported by umh-core:
  // - GetLogs (action type: get-logs)
  // - GetMetrics (action type: get-metrics)

  // Queue action to get device logs
  // Supported by: umh-core GetLogs action
  // Request payload specifies the log source type (agent, dfc, redpanda, etc.)
  // Some types require a uuid field to identify the specific component
  // Response: ActionQueuedResponse with action_id to poll for results
  rpc GetLogs(GetLogsRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/logs"
      body: "*"
    };
  }

  // Get result of GetLogs action
  rpc GetLogsActionResponse(ActionResultRequest) returns (LogsActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/logs/{action_id}/result"
    };
  }

  // Queue action to get device metrics
  // Supported by: umh-core GetMetrics action
  // Request payload specifies the metric source type (dfc, redpanda, protocol-converter, etc.)
  // Some types require a uuid field to identify the specific component
  // Response: ActionQueuedResponse with action_id to poll for results
  rpc GetMetrics(GetMetricsRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/metrics"
      body: "*"
    };
  }

  // Get result of GetMetrics action
  rpc GetMetricsActionResponse(ActionResultRequest) returns (MetricsActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/metrics/{action_id}/result"
    };
  }

  // ============================================================================
  // Protocol Converter RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // All protocol converter operations are asynchronous. Supported by umh-core:
  // - Deploy (action type: deploy-protocol-converter)
  // - Edit (action type: edit-protocol-converter)
  // - Delete (action type: delete-protocol-converter)
  // - Get (action type: get-protocol-converter)

  // Queue action to deploy a new protocol converter (bridge)
  // Supported by: umh-core DeployProtocolConverter action
  rpc DeployProtocolConverter(DeployProtocolConverterRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters"
      body: "*"
    };
  }

  // Queue action to edit an existing protocol converter
  // Supported by: umh-core EditProtocolConverter action
  rpc EditProtocolConverter(EditProtocolConverterRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      patch: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters/{uuid}"
      body : "*"
    };
  }

  // Queue action to delete a protocol converter
  // Supported by: umh-core DeleteProtocolConverter action
  rpc DeleteProtocolConverter(DeleteProtocolConverterRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      delete: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters/{uuid}"
    };
  }

  // Queue action to get an existing protocol converter
  // Supported by: umh-core GetProtocolConverter action
  rpc GetProtocolConverter(GetProtocolConverterRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters/{uuid}"
    };
  }

  // List all protocol converters for a device
  rpc ListProtocolConverters(ListProtocolConvertersRequest) returns (ListProtocolConvertersResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters"
    };
  }

  // Get result of any protocol converter action
  rpc GetProtocolConverterActionResponse(ActionResultRequest) returns (ProtocolConverterActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/protocol-converters/{action_id}/result"
    };
  }

  // ============================================================================
  // Data Flow Component RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // All DFC operations are asynchronous. Supported by umh-core:
  // - Deploy (action type: deploy-data-flow-component)
  // - Edit (action type: edit-data-flow-component)
  // - Delete (action type: delete-data-flow-component)
  // - Get (action type: get-data-flow-component)

  // Queue action to deploy a new data flow component
  // Supported by: umh-core DeployDataFlowComponent action
  rpc DeployDataFlowComponent(DeployDataFlowComponentRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components"
      body: "*"
    };
  }

  // Queue action to edit an existing data flow component
  // Supported by: umh-core EditDataFlowComponent action
  rpc EditDataFlowComponent(EditDataFlowComponentRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      patch: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components/{uuid}"
      body : "payload"
    };
  }

  // Queue action to delete a data flow component
  // Supported by: umh-core DeleteDataFlowComponent action
  rpc DeleteDataFlowComponent(DeleteDataFlowComponentRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      delete: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components/{uuid}"
    };
  }

  // Queue action to get an existing data flow component
  // Supported by: umh-core GetDataFlowComponent action
  rpc GetDataFlowComponent(GetDataFlowComponentRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components/{uuid}"
    };
  }

  // List all data flow components for a device
  rpc ListDataFlowComponents(ListDataFlowComponentsRequest) returns (ListDataFlowComponentsResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components"
    };
  }

  // Get result of any data flow component action
  rpc GetDataFlowComponentActionResponse(ActionResultRequest) returns (DataFlowComponentActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-flow-components/{action_id}/result"
    };
  }

  // ============================================================================
  // Data Model RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // All data model operations are asynchronous. Supported by umh-core:
  // - Add (action type: add-datamodel)
  // - Edit (action type: edit-datamodel)
  // - Delete (action type: delete-datamodel)
  // - Get (action type: get-datamodel)

  // Queue action to add a new data model
  // Supported by: umh-core AddDataModel action
  rpc AddDataModel(AddDataModelRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/data-models"
      body: "*"
    };
  }

  // Queue action to edit an existing data model
  // Supported by: umh-core EditDataModel action
  rpc EditDataModel(EditDataModelRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      patch: "/api/v1/devicemgmt/devices/{device_id}/data-models/{name}"
      body : "*"
    };
  }

  // Queue action to delete a data model
  // Supported by: umh-core DeleteDataModel action
  rpc DeleteDataModel(DeleteDataModelRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      delete: "/api/v1/devicemgmt/devices/{device_id}/data-models/{name}"
    };
  }

  // Queue action to get a data model
  // Supported by: umh-core GetDataModel action
  rpc GetDataModel(GetDataModelRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-models/{name}"
    };
  }

  // List all data models for a device
  rpc ListDataModels(ListDataModelsRequest) returns (ListDataModelsResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-models"
    };
  }

  // Get result of any data model action
  rpc GetDataModelActionResponse(ActionResultRequest) returns (DataModelActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/data-models/{action_id}/result"
    };
  }

  // ============================================================================
  // Stream Processor RPCs (ASYNCHRONOUS - umh-core supported)
  // ============================================================================
  // All stream processor operations are asynchronous. Supported by umh-core:
  // - Deploy (action type: deploy-stream-processor)
  // - Edit (action type: edit-stream-processor)
  // - Delete (action type: delete-stream-processor)
  // - Get (action type: get-stream-processor)

  // Queue action to deploy a new stream processor
  // Supported by: umh-core DeployStreamProcessor action
  rpc DeployStreamProcessor(DeployStreamProcessorRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      post: "/api/v1/devicemgmt/devices/{device_id}/stream-processors"
      body: "*"
    };
  }

  // Queue action to edit an existing stream processor
  // Supported by: umh-core EditStreamProcessor action
  rpc EditStreamProcessor(EditStreamProcessorRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      patch: "/api/v1/devicemgmt/devices/{device_id}/stream-processors/{uuid}"
      body : "*"
    };
  }

  // Queue action to delete a stream processor
  // Supported by: umh-core DeleteStreamProcessor action
  rpc DeleteStreamProcessor(DeleteStreamProcessorRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      delete: "/api/v1/devicemgmt/devices/{device_id}/stream-processors/{uuid}"
    };
  }

  // Queue action to get a stream processor
  // Supported by: umh-core GetStreamProcessor action
  rpc GetStreamProcessor(GetStreamProcessorRequest) returns (ActionQueuedResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/stream-processors/{uuid}"
    };
  }

  // List all stream processors for a device
  rpc ListStreamProcessors(ListStreamProcessorsRequest) returns (ListStreamProcessorsResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/stream-processors"
    };
  }

  // Get result of any stream processor action
  rpc GetStreamProcessorActionResponse(ActionResultRequest) returns (StreamProcessorActionResponse) {
    option (google.api.http) = {
      get: "/api/v1/devicemgmt/devices/{device_id}/stream-processors/{action_id}/result"
    };
  }

}

  // ============================================================================
  // Device Management Request/Response Messages
  // ============================================================================

// RegisterDeviceRequest contains device registration information
message RegisterDeviceRequest {
  string name          = 1; // Human-readable device name
  string createdBy     = 2; // Owner UUID (tenant identifier)
  DeviceLocation location = 3;
  // Certificate management (optional)
  // NOTE: Certificate is for device identification only. Private keys are device-side and should NOT be transmitted to server.
  string certificate = 4; // PEM-encoded X.509 certificate (optional - auto-generated if not provided)
}

// RegisterDeviceResponse returns registration details including auth token
// NOTE: Timestamps duplicated from device summary for convenience (device.created_at, device.auth_token_expires_at)
message RegisterDeviceResponse {
  DeviceSummary device = 1; // Summary of registered device (no certificate data)
  string auth_token      = 2; // One-time auth token (shown only here)
  // Setup instructions
  map<string, string> instructions = 3;
}

// ListDevicesRequest filters and paginates device listing
// DeviceSortField defines sortable fields for device list queries
enum DeviceSortField {
  DEVICE_SORT_FIELD_UNSPECIFIED = 0;
  NAME = 1;
  CREATED_AT = 2;
  LAST_SEEN = 3;
  CREATED_BY = 4;
}

message ListDevicesRequest {
  int32  page_size  = 1 [json_name = "page_size"]; // Maximum number of results per page (0 = default)
  string page_token = 2 [json_name = "page_token"]; // Token from previous response for pagination

  // Filters
  repeated DeviceStatus status = 3; // Filter by status (multiple statuses supported)
  string location_level_0 = 4 [json_name = "location_level_0"]; // Filter by enterprise/company level

  string search = 5; // Full-text search in name, serial number
  string created_by = 8 [json_name = "created_by"]; // Filter by device owner/tenant UUID

  // Sorting
  DeviceSortField sort_by   = 6 [json_name = "sort_by"]; // Sort field (default: CREATED_AT)
  bool            sort_desc = 7 [json_name = "sort_desc"]; // Sort in descending order
}

// ListDevicesResponse contains paginated device list
message ListDevicesResponse {
  repeated DeviceSummary devices         = 1; // Lightweight summaries (no certificate data)
  string                 next_page_token = 2; // Token for next page (empty if no more pages)
}

// GetDeviceRequest retrieves a single device
message GetDeviceRequest {
  string device_id = 1;
}

// GetDeviceHealthRequest retrieves device health metrics
message GetDeviceHealthRequest {
  string device_id = 1;
}

// DeviceHealthResponse contains health metrics from latest Push API data
message DeviceHealthResponse {
  string                        device_id        = 1;
  google.protobuf.Timestamp     last_updated     = 2; // When health data was last received from device
  api.umh_core.v2.StatusMessage status           = 3; // Complete device status from Push API
  string                        status_b64       = 4; // Base64-encoded StatusMessage (fallback if status fails to unmarshal)
  google.protobuf.Timestamp     device_timestamp = 5; // Device's own timestamp from status message
  string                        error_message    = 6; // Error message if health data unavailable
}

// UpdateDeviceRequest updates device information
message UpdateDeviceRequest {
  string device_id = 1;

  string         name     = 2;
  DeviceLocation location = 3;
}

// DeleteDeviceRequest decommissions a device
message DeleteDeviceRequest {
  string device_id = 1;
  bool   force     = 2; // Force deletion even if recently active
}

// ============================================================================
// Action Queued Response (returned by all action-sending RPCs)
// ============================================================================

// ActionQueuedResponse is returned by all action-sending RPCs
message ActionQueuedResponse {
  string                    action_id  = 1; // UUID of the queued action
  google.protobuf.Timestamp created_at = 2; // When action was created
  google.protobuf.Timestamp expires_at = 3; // When action expires (5 min default)
}

// ============================================================================
// ACTION RESULT POLLING - Shared Request
// ============================================================================
// Used by all GetXActionResponse RPCs to poll for action results

message ActionResultRequest {
  string device_id = 1;
  string action_id = 2;
}

// ============================================================================
// DEVICE CONFIGURATION
// ============================================================================
// Queue action to get/set device configuration

message GetDeviceConfigRequest {
  string device_id = 1;
}

message SetDeviceConfigRequest {
  string                               device_id     = 1;
  api.umh_core.v2.SetConfigFilePayload payload       = 2; // Request wrapped payload
  string                               change_reason = 3; // Audit trail: reason for config change (optional)
}

message DeviceConfigActionResponse {
  string                              action_id      = 1;
  ActionStatus                        status         = 2; // Action lifecycle status
  google.protobuf.Timestamp           completed_at   = 3;
  string                              error_message  = 4; // Set when status=FAILED
  // Structured response - only populated when status=COMPLETED
  // If status!=COMPLETED, result is empty and error_message contains the error
  oneof result {
    api.umh_core.v2.GetConfigFileResponse get_config_response = 5; // Response for GetDeviceConfig action
    api.umh_core.v2.SetConfigFileResponse set_config_response = 6; // Response for SetDeviceConfig action (success=true if populated)
  }
}

// ============================================================================
// DEVICE LOGS
// ============================================================================
// Queue action to retrieve device logs

message GetLogsRequest {
  string                         device_id = 1;
  api.umh_core.v2.GetLogsPayload payload   = 2; // Request wrapped payload
}

message LogsActionResponse {
  string                    action_id      = 1;
  ActionStatus              status         = 2;
  google.protobuf.Timestamp completed_at   = 3;
  string                    error_message  = 4;
  // Result payload (only populated when status=COMPLETED)
  // Format: JSON string containing array of log lines: ["line 1", "line 2", ...]
  // Server automatically decompresses gzip/zstd payloads before returning
  // Client can directly parse as JSON without decoding base64
  string                    result_payload = 5;
}

// ============================================================================
// DEVICE METRICS
// ============================================================================
// Queue action to retrieve device metrics

message GetMetricsRequest {
  string                            device_id = 1;
  api.umh_core.v2.GetMetricsPayload payload   = 2; // Request wrapped payload
}

message MetricsActionResponse {
  string                    action_id      = 1;
  ActionStatus              status         = 2;
  google.protobuf.Timestamp completed_at   = 3;
  string                    error_message  = 4;
  // Result payload (only populated when status=COMPLETED)
  // Format: JSON string containing array of metric objects
  // Each metric: {"name": "...", "value": "...", "componentType": "...", ...}
  // Server automatically decompresses gzip/zstd payloads before returning
  // Client can directly parse as JSON without decoding base64
  string                    result_payload = 5;
}

// ============================================================================
// PROTOCOL CONVERTERS
// ============================================================================
// Queue actions to deploy, edit, delete, or get protocol converters (bridges)
// Action pattern: Queue request → receive action_id → poll GetProtocolConverterActionResponse(action_id) → receive result

message DeployProtocolConverterRequest {
  string                             device_id = 1;
  api.umh_core.v2.ProtocolConverter  payload   = 2; // Full ProtocolConverter model (uuid will be generated by umh-core if empty)
}

message EditProtocolConverterRequest {
  string device_id = 1;
  // Protocol converter UUID (path parameter - authoritative)
  // If payload.uuid is provided, it must match this value (validation at API)
  string                                       uuid      = 2;
  api.umh_core.v2.ProtocolConverter payload   = 3;
}

message DeleteProtocolConverterRequest {
  string                                         device_id = 1;
  string                                         uuid      = 2; // Protocol converter UUID
}

message GetProtocolConverterRequest {
  string device_id = 1;
  string uuid      = 2;
}

message ProtocolConverterActionResponse {
  string                            action_id     = 1;
  ActionStatus                      status        = 2;
  google.protobuf.Timestamp         completed_at  = 3;
  string                            error_message = 4;
  // result field contents:
  // - Deploy/Edit/Get: populated with the ProtocolConverter object
  // - Delete: empty (when status=COMPLETED, no object is returned)
  api.umh_core.v2.ProtocolConverter result        = 5;
}

message ListProtocolConvertersRequest {
  string device_id  = 1;
  int32  page_size  = 2 [json_name = "page_size"]; // Maximum number of results per page (0 = default 20, max 100)
  string page_token = 3 [json_name = "page_token"]; // Token from previous response for pagination
  
  // Optional filters
  string uuid_filter = 4 [json_name = "uuid_filter"]; // Filter by exact UUID match
  string name_filter = 5 [json_name = "name_filter"]; // Filter by name (substring match)
  string type_filter = 6 [json_name = "type_filter"]; // Filter by protocol type (e.g., "benthos_opcua"). Empty = all types
  string deployment_status_filter = 7 [json_name = "deployment_status_filter"]; // Filter: "PENDING", "ACTIVE", "FAILED". Empty = all statuses
  string connection_uuid_filter = 8 [json_name = "connection_uuid_filter"]; // Filter by connection UUID
  string health_status_filter = 9 [json_name = "health_status_filter"]; // Filter by health status: "ONLINE", "OFFLINE", "UNKNOWN"
}

message ListProtocolConvertersResponse {
  repeated ProtocolConverterSummary converters      = 1;
  string                            next_page_token = 2; // Token for next page (empty if no more pages)
}

message ProtocolConverterSummary {
  string uuid                  = 1;
  string name                  = 2;
  string type                  = 3;
  string connectionUUID        = 4;
  string deployment_status     = 5; // "PENDING", "ACTIVE", or "FAILED"
  string health_status         = 6; // "ONLINE", "OFFLINE", or "UNKNOWN"
  string last_sync_time        = 7; // RFC3339 timestamp of last StatusMessage sync
  string error_message         = 8; // Only populated if deployment_status="FAILED"
}

// ============================================================================
// DATA FLOW COMPONENTS
// ============================================================================
// Queue actions to deploy, edit, delete, or get data flow components
// Action pattern: Queue request → receive action_id → poll GetDataFlowComponentActionResponse(action_id) → receive result
// All payloads use umh-core wire protocol types for direct compatibility

message DeployDataFlowComponentRequest {
  string                                         device_id = 1;
  api.umh_core.v2.DeployDataFlowComponentPayload payload   = 2; // Umh-core compatible payload
}

message EditDataFlowComponentRequest {
  string                                       device_id = 1;
  string                                       uuid      = 2; // DFC UUID to edit (path parameter - takes precedence over payload.uuid)
  api.umh_core.v2.EditDataFlowComponentPayload payload   = 3; // Umh-core compatible payload
}

message DeleteDataFlowComponentRequest {
  string device_id = 1;
  string uuid      = 2; // DFC UUID to delete
}

message GetDataFlowComponentRequest {
  string device_id = 1;
  string uuid      = 2; // DFC UUID to retrieve
}

message DataFlowComponentActionResponse {
  string                            action_id     = 1;
  ActionStatus                      status        = 2;
  google.protobuf.Timestamp         completed_at  = 3;
  string                            error_message = 4;
  api.umh_core.v2.DataFlowComponent result        = 5; // Empty for Delete action
}

message ListDataFlowComponentsRequest {
  string device_id  = 1;
  int32  page_size  = 2 [json_name = "page_size"]; // Maximum number of results per page (0 = default)
  string page_token = 3 [json_name = "page_token"]; // Token from previous response for pagination
}

message ListDataFlowComponentsResponse {
  repeated DataFlowComponentSummary components      = 1;
  string                            next_page_token = 2; // Token for next page (empty if no more pages)
}

message DataFlowComponentSummary {
  string uuid            = 1;
  string name            = 2;
  string benthosImageTag = 3;
}

// ============================================================================
// DATA MODELS
// ============================================================================
// Queue actions to add, edit, delete, or get data models
// Action pattern: Queue request → receive action_id → poll GetDataModelActionResponse(action_id) → receive result

message AddDataModelRequest {
  string device_id                = 1;
  string name                      = 2; // Data model name
  string description               = 3; // Optional: Data model description
  google.protobuf.Struct structure = 4; // JSON structure object (handler will convert to YAML and base64 encode)
}

message EditDataModelRequest {
  string device_id                = 1;
  string name                      = 2; // Model name
  string description               = 3; // Optional: Data model description
  google.protobuf.Struct structure = 4; // JSON structure object (handler will convert to YAML and base64 encode)
}

message DeleteDataModelRequest {
  string device_id = 1;
  string name      = 2; // Model name to delete
}

message GetDataModelRequest {
  string device_id       = 1;
  string name            = 2; // Model name
  string version         = 3; // Optional: specific version (e.g., "1", "2", "3"). If empty, returns all versions
  bool getEnrichedTree   = 4; // Whether to include referenced model data in response (optional)
}

message DataModelActionResponse {
  string                                   action_id     = 1;
  ActionStatus                             status        = 2;
  google.protobuf.Timestamp                completed_at  = 3;
  string                                   error_message = 4;
  api.umh_core.v2.DataModelOperationResult result        = 5; // Single version result (if version specified in request). Empty for Delete action
  map<string, api.umh_core.v2.DataModelOperationResult> results = 6; // Multiple versions (if no version specified in request). Key is version string (e.g., "1", "2", "3")
}

message ListDataModelsRequest {
  string device_id      = 1;
  int32  page_size      = 2 [json_name = "page_size"]; // Maximum number of results per page (0 = default 20, max 100)
  string page_token     = 3 [json_name = "page_token"]; // Token from previous response for pagination
  
  // Optional filters
  string name_filter    = 4 [json_name = "name_filter"]; // Filter by name (substring match)
  string version_filter = 5 [json_name = "version_filter"]; // Filter by version (exact match, e.g., "1.0.0")
}

message ListDataModelsResponse {
  repeated DataModelSummary models          = 1;
  string                    next_page_token = 2; // Token for next page (empty if no more pages)
}

message DataModelSummary {
  string name        = 1;
  string version     = 2; // Specific version (e.g., "1.0.0", "2.1.0")
  string description = 3; // Version description
}

// ============================================================================
// STREAM PROCESSORS
// ============================================================================
// Queue actions to deploy, edit, delete, or get stream processors
// Action pattern: Queue request → receive action_id → poll GetStreamProcessorActionResponse(action_id) → receive result

message DeployStreamProcessorRequest {
  string                      device_id = 1;
  string                      name = 2; // Processor name (required)
  string                      uuid = 3; // Optional: server-generated if empty
  google.protobuf.Struct      config = 4; // JSON config (handler will convert to YAML and base64 encode, required)
  string                      model_name = 5; // Data model name (required)
  string                      model_version = 6; // Data model version (required)
  map<int32, string>          location = 7; // Hierarchical location (0=enterprise, 1=site, etc., optional)
  bool                        ignore_health_check = 8;
}

message EditStreamProcessorRequest {
  string                      device_id = 1;
  string                      uuid = 2; // Stream processor UUID to edit (path parameter, required)
  string                      name = 3; // Required: name of the stream processor
  google.protobuf.Struct      config = 4; // Required: new config (JSON)
  string                      model_name = 5; // Required: model name (must match a DataModel)
  string                      model_version = 6; // Required: model version (must match a DataModel version)
  map<int32, string>          location = 7; // Optional: update location
  bool                        ignore_health_check = 8; // Optional: ignore health check
}

message DeleteStreamProcessorRequest {
  string device_id = 1;
  string uuid      = 2; // Stream processor UUID to delete
}

message GetStreamProcessorRequest {
  string device_id = 1;
  string uuid      = 2; // Stream processor UUID
}

message StreamProcessorActionResponse {
  string                    action_id     = 1;
  ActionStatus              status        = 2;
  google.protobuf.Timestamp completed_at  = 3;
  string                    error_message = 4;
  string                    uuid          = 5; // Stream processor UUID (populated on success)
  string                    name          = 6; // Stream processor name (populated on success)
  google.protobuf.Struct    config        = 7; // Decoded config (sources and mappings)
  StreamProcessorModelRef   model         = 8; // Data model reference (name and version)
  map<int32, string>        location      = 9; // Location hierarchy (populated on success)
}

message StreamProcessorModelRef {
  string name    = 1; // Data model name
  string version = 2; // Data model version
}

message ListStreamProcessorsRequest {
  string device_id  = 1;
  int32  page_size  = 2 [json_name = "page_size"]; // Maximum number of results per page (0 = default 20, max 100)
  string page_token = 3 [json_name = "page_token"]; // Token from previous response for pagination
  
  // Optional filters
  string uuid_filter = 4 [json_name = "uuid_filter"]; // Filter by exact UUID match
  string name_filter = 5 [json_name = "name_filter"]; // Filter by name (substring match)
  string deployment_status_filter = 6 [json_name = "deployment_status_filter"]; // Filter: "PENDING", "ACTIVE", "FAILED". Empty = all statuses
  string health_status_filter = 7 [json_name = "health_status_filter"]; // Filter by health status: "ONLINE", "OFFLINE", "UNKNOWN". Empty = all
  string model_name_filter = 8 [json_name = "model_name_filter"]; // Filter by model name (substring match)
}

message ListStreamProcessorsResponse {
  repeated StreamProcessorSummary processors      = 1;
  string                          next_page_token = 2; // Token for next page (empty if no more pages)
}

message StreamProcessorSummary {
  string                                  uuid              = 1;
  string                                  name              = 2;
  api.umh_core.v2.StreamProcessorModelRef model             = 3;
  string                                  deployment_status = 4; // "PENDING", "ACTIVE", or "FAILED"
  string                                  health_status     = 5; // "ONLINE", "OFFLINE", or "UNKNOWN"
  string                                  last_sync_time    = 6; // RFC3339 timestamp of last StatusMessage sync
  string                                  error_message     = 7; // Only populated if deployment_status="FAILED"
}

// ============================================================================
// HEALTH CHECK
// ============================================================================
// Service health status for Docker healthchecks, Kubernetes probes, and load balancers

message HealthResponse {
  // Status code: "healthy" | "degraded" | "unhealthy"
  string status = 1;
  
  // Human-readable message
  string message = 2;
  
  // Service version
  string version = 3;
  
  // Timestamp of health check
  google.protobuf.Timestamp timestamp = 4;
  
  // Database connectivity status
  bool database_connected = 5;
  
  // Optional: Additional diagnostic info
  map<string, string> diagnostics = 6;
}
