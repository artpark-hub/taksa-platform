syntax = "proto3";

package api.devicemgmt.v1;

import "google/protobuf/timestamp.proto";
import "devicemgmt/v1/models.proto";
import "devicemgmt/v1/protocol_converter_common.proto";
import "devicemgmt/v1/protocol_converter_opcua.proto";

option go_package = "github.com/artpark-hub/taksa-platform/device-management/api/devicemgmt/v1;v1";
option java_multiple_files = true;
option java_package = "api.devicemgmt.v1";

// ============================================================================
// Input (Modbus) — Standard / Advanced / Additional settings
// YAML schema: taksa-benthos-umh modbus_plugin
// ============================================================================

message ModbusLegacyAddress {
  string name = 1;
  string register = 2;
  uint32 address = 3;
  string type = 4;
  uint32 length = 5;
  uint32 bit = 6;
  double scale = 7;
  string output = 8;
  uint32 slave_id = 9;
}

message ModbusStandardInputConfig {
  // e.g. tcp://{{ .IP }}:{{ .PORT }}
  string controller = 1;
  repeated uint32 slave_ids = 2;
  // Preferred address format: name.register.address.type[:key=value]*
  repeated string unified_addresses = 3;
  // Deprecated on device when unified_addresses is set.
  repeated ModbusLegacyAddress addresses = 4;
  string time_between_reads = 5;
  string timeout = 6;
}

message ModbusWorkaroundsConfig {
  string pause_after_connect = 1;
  bool one_request_per_field = 2;
  bool read_coils_starting_at_zero = 3;
  string time_between_requests = 4;
  string string_register_location = 5;
}

message ModbusAdvancedInputConfig {
  string transmission_mode = 1;
  string optimization = 2;
  int32 optimization_max_register_fill = 3;
  string byte_order = 4;
  int32 busy_retries = 5;
  string busy_retries_wait = 6;
  ModbusWorkaroundsConfig workarounds = 7;
}

message ModbusAdditionalSetting {
  string key = 1;
  string value = 2;
}

message ModbusInputStructuredConfig {
  ModbusStandardInputConfig standard = 1;
  ModbusAdvancedInputConfig advanced = 2;
  repeated ModbusAdditionalSetting additional_settings = 3;
}

message ModbusInputSection {
  ModbusInputStructuredConfig structured = 1;
  string raw_yaml = 2;
  EditSectionMode mode = 3;
}

// ============================================================================
// Deploy / Edit / Get — read_flow reuses OpcUaReadFlowSection (tag_processor)
// ============================================================================

message DeployModbusProtocolConverterRequest {
  string device_id = 1;
  string name = 2;
  ProtocolConverterConnection connection = 3;
  ProtocolConverterLocation location = 4;
  ModbusInputSection input = 5;
  OpcUaReadFlowSection read_flow = 6;
  map<string, string> template_variables = 7;
  bool apply_read_config = 8;
  string state = 9;
}

message EditModbusProtocolConverterRequest {
  string device_id = 1;
  string uuid = 2;
  string name = 3;
  ProtocolConverterConnection connection = 4;
  ProtocolConverterLocation location = 5;
  ModbusInputSection input = 6;
  OpcUaReadFlowSection read_flow = 7;
  map<string, string> template_variables = 8;
  string state = 9;
}

message GetModbusProtocolConverterRequest {
  string device_id = 1;
  string uuid = 2;
}

message ModbusProtocolConverter {
  string uuid = 1;
  string name = 2;
  ProtocolConverterConnection connection = 3;
  ProtocolConverterLocation location = 4;
  BridgeDataType data_type = 5;
  ModbusInputSection input = 6;
  OpcUaReadFlowSection read_flow = 7;
  OpcUaOutputInfo output = 8;
  string raw_input_yaml = 9;
  string raw_processor_yaml = 10;
  string raw_buffer_yaml = 11;
  map<string, string> template_variables = 12;
  SectionParseStatus input_parse = 13;
  SectionParseStatus processor_parse = 14;
  string deployment_status = 15;
  string health_status = 16;
  string error_message = 17;
  string processing_mode = 18;
  string protocol = 19;
  string state = 20;
}

message ModbusProtocolConverterActionResponse {
  string action_id = 1;
  ActionStatus status = 2;
  google.protobuf.Timestamp completed_at = 3;
  string error_message = 4;
  ProtocolConverterWorkflowStage stage = 5;
  ProtocolConverterWorkflowSteps steps = 6;
  ProtocolConverterRollbackStatus rollback_status = 7;
  ModbusProtocolConverter result = 8;
}
