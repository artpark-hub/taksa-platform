syntax = "proto3";

package api.devicemgmt.v1;

import "google/protobuf/timestamp.proto";
import "google/protobuf/struct.proto";

option go_package = "github.com/artpark-hub/taksa-platform/device-management/api/devicemgmt/v1;v1";
option java_multiple_files = true;
option java_package = "api.devicemgmt.v1";

// Topic metadata key/value (parity with umh-core GraphQL MetadataEntry).
message TopicMetadataEntry {
  string key = 1;
  string value = 2;
}

// Exact metadata match filter (parity with GraphQL MetaExpr: key + eq).
message TopicMetaEq {
  string key = 1;
  string eq = 2;
}

// Scalar type hint for time-series payloads (parity with GraphQL ScalarType).
enum TopicScalarType {
  TOPIC_SCALAR_TYPE_UNSPECIFIED = 0;
  NUMERIC = 1;
  STRING = 2;
  BOOLEAN = 3;
}

// How the last status sync updated the materialized catalog.
enum TopicCatalogSyncMode {
  TOPIC_CATALOG_SYNC_MODE_UNSPECIFIED = 0;
  INCREMENTAL = 1;
  FULL_REPLACE = 2;
  EMPTY = 3; // topicCount == 0, catalog cleared
}

// Time-series last event (parity with GraphQL TimeSeriesEvent).
message TopicTimeSeriesEvent {
  google.protobuf.Timestamp produced_at = 1;
  google.protobuf.Timestamp source_ts = 2;
  TopicScalarType scalar_type = 3;
  optional double numeric_value = 4;
  optional string string_value = 5;
  optional bool boolean_value = 6;
  repeated TopicMetadataEntry kafka_headers = 7;
}

// Relational last event (parity with GraphQL RelationalEvent JSON).
message TopicRelationalEvent {
  google.protobuf.Timestamp produced_at = 1;
  google.protobuf.Struct json = 2;
  repeated TopicMetadataEntry kafka_headers = 3;
}

// One UNS topic row materialized from device status (core.topicBrowser).
message DeviceTopic {
  string topic = 1; // Canonical UNS path (same construction as umh-core GraphQL topic field)
  string uns_tree_id = 2;
  string level_0 = 3 [json_name = "level_0"];
  repeated string location_sublevels = 4;
  string data_contract = 5;
  optional string virtual_path = 6;
  string name = 7;
  repeated TopicMetadataEntry metadata = 8;
  oneof last_event {
    TopicTimeSeriesEvent time_series = 9;
    TopicRelationalEvent relational = 10;
  }
  google.protobuf.Timestamp updated_at = 11;
}

message ListDeviceTopicsRequest {
  string device_id = 1;
  int32 page_size = 2 [json_name = "page_size"]; // 0 = default 100, max 500
  string page_token = 3 [json_name = "page_token"];
  string text = 4;
  repeated TopicMetaEq meta = 5;
  // Canonical path prefix (dot-separated), e.g. "Enterprise.Site.Line1."
  string path_prefix = 6 [json_name = "path_prefix"];
  // When true, omit last_event from each topic (smaller payloads for tree shells).
  bool omit_last_event = 7 [json_name = "omit_last_event"];
}

message ListDeviceTopicsResponse {
  repeated DeviceTopic topics = 1;
  string next_page_token = 2 [json_name = "next_page_token"];
  int32 total_count = 3 [json_name = "total_count"];
  int32 filtered_count = 4 [json_name = "filtered_count"];
}

message GetDeviceTopicRequest {
  string device_id = 1;
  string uns_tree_id = 2 [json_name = "uns_tree_id"];
  string canonical_topic = 3 [json_name = "canonical_topic"];
}

// Materialized catalog sync state for a device (from status, no edge changes).
message DeviceTopicCatalogStatus {
  string device_id = 1;
  google.protobuf.Timestamp catalog_last_synced_at = 2;
  int32 reported_topic_count = 3 [json_name = "reported_topic_count"];
  int32 materialized_topic_count = 4 [json_name = "materialized_topic_count"];
  TopicCatalogSyncMode last_sync_mode = 5 [json_name = "last_sync_mode"];
  google.protobuf.Timestamp last_full_replace_at = 6 [json_name = "last_full_replace_at"];
  bool last_had_bundle_zero = 7 [json_name = "last_had_bundle_zero"];
  // True when materialized count exceeds last reported count (incremental-only sync for a while).
  bool catalog_stale_warning = 8 [json_name = "catalog_stale_warning"];
}

message GetDeviceTopicCatalogStatusRequest {
  string device_id = 1;
}

// Queue edge subscribe so the DCD emits status (core.topicBrowser) over push.
// Use when auto resubscribe on pull is disabled, or to force refresh for one device.
message EnsureDeviceStatusSubscriptionRequest {
  string device_id = 1;
  // When false, edge treats subscriber as new and may send bootstrap bundle 0 (heavier).
  // When unset, defaults to true (refresh TTL with incremental status only).
  optional bool resubscribed = 2;
}

message EnsureDeviceStatusSubscriptionResponse {
  string action_id = 1 [json_name = "action_id"];
  bool already_pending = 2 [json_name = "already_pending"];
  google.protobuf.Timestamp created_at = 3 [json_name = "created_at"];
  google.protobuf.Timestamp expires_at = 4 [json_name = "expires_at"];
}

// One node in the UNS hierarchy (lazy tree expand).
message TopicTreeNode {
  string segment = 1;
  bool is_leaf = 2 [json_name = "is_leaf"];
  int32 descendant_leaf_count = 3 [json_name = "descendant_leaf_count"];
  string uns_tree_id = 4 [json_name = "uns_tree_id"];
  string canonical_topic = 5 [json_name = "canonical_topic"];
}

message ListTopicNodesRequest {
  string device_id = 1;
  // Segments already expanded, e.g. ["Enterprise", "Site"] for children under Enterprise.Site
  repeated string path_prefix = 2 [json_name = "path_prefix"];
  string text = 3;
  repeated TopicMetaEq meta = 4;
}

message ListTopicNodesResponse {
  repeated TopicTreeNode nodes = 1;
  string path_prefix = 2 [json_name = "path_prefix"];
}
